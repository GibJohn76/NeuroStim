<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEURO_STIM APEX v24</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #0a0a0c; --accent: #4deeea; 
            --danger: #ff2d55; --success: #00ffa3; --border: #1a1a1c; --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
        }

        header {
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 3px; color: var(--accent); }

        .view-switch {
            display: flex; background: #111; padding: 4px; border-radius: 10px; border: 1px solid #222;
        }
        .v-btn { 
            padding: 6px 12px; border: none; background: none; color: #444; 
            font-size: 0.6rem; font-weight: 900; cursor: pointer; border-radius: 6px;
        }
        .v-btn.active { background: #222; color: var(--accent); }

        .app-content {
            flex: 1; display: flex; flex-direction: column; padding: 20px 40px; gap: 30px; overflow: hidden;
        }

        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px; 
            max-width: 1000px; margin: 0 auto; width: 100%;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.65rem; color: #888; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 900; }

        .chart-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .period-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab { 
            background: #111; border: 1px solid #222; color: #555; padding: 10px 20px; 
            border-radius: 8px; font-size: 0.7rem; font-weight: 700; cursor: pointer;
        }
        .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(77, 238, 234, 0.05); }

        #chart-wrapper { flex: 1; min-height: 0; position: relative; }

        footer {
            padding: 0 40px 50px 40px; display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto; width: 100%;
        }

        .sos-box {
            width: 120px; height: 70px; border: 2px solid var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-weight: 900; font-size: 0.8rem; cursor: pointer; text-align: center;
        }

        .log-circle {
            width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--danger);
            display: flex; align-items: center; justify-content: center;
            color: var(--danger); font-weight: 900; font-size: 1rem; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.2); transition: 0.2s;
        }
        .log-circle:active { transform: scale(0.95); }

        .chrono-section { text-align: right; min-width: 120px; }
        .chrono-time { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 900; }
        .health-hint { font-size: 0.6rem; color: var(--success); font-weight: 800; margin-top: 5px; text-transform: uppercase; }

        #settings {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000;
            display: none; padding: 40px; overflow-y: auto;
        }
        .modal { max-width: 500px; margin: auto; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 20px; font-size: 1.1rem; }
        
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .btn-reset { background: #330000; color: #ff2d55; border: 1px solid #550000; margin-top: 40px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEURO_STIM <span style="font-weight:100; opacity:0.6">APEX</span></div>
        <div class="view-switch">
            <button class="v-btn active" id="v-cig" onclick="toggleView('cig')">UNITÉS</button>
            <button class="v-btn" id="v-cash" onclick="toggleView('cash')">DÉPENSES</button>
            <button class="v-btn" onclick="window.location.href='Rythme.html'">RYTHME</button>
            <button class="v-btn" onclick="window.location.href='Analytic.html'">ANALYTIC</button>
        </div>
        <button onclick="ui('settings', true)" style="background:none; border:none; color:#444; font-size:1.5rem; cursor:pointer;">⚙</button>
    </header>

    <div class="app-content">
        <section class="stats-grid">
            <div class="stat-item">
                <span class="stat-label" id="label-total">Investi Total</span>
                <div class="stat-value" id="val-total" style="color:var(--danger)">0.00€</div>
            </div>
            <div class="stat-item">
                <span class="stat-label" id="label-avg">Moyenne 7J</span>
                <div class="stat-value" id="val-avg">0.0</div>
            </div>
            <div class="stat-item">
                <span class="stat-label" id="label-today">Aujourd'hui</span>
                <div class="stat-value" id="val-today">0</div>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tendance</span>
                <div class="stat-value" id="val-trend">STABLE</div>
            </div>
        </section>

        <section class="chart-section">
            <div class="period-tabs">
                <button class="tab active" id="btn-7j" onclick="changePeriod('7j')">7 JOURS</button>
                <button class="tab" id="btn-30j" onclick="changePeriod('30j')">30 JOURS</button>
                <button class="tab" id="btn-1an" onclick="changePeriod('1an')">1 AN</button>
            </div>
            <div id="chart-wrapper"><canvas id="apexChart"></canvas></div>
        </section>
    </div>

    <footer>
        <div class="sos-box" id="sos-btn" onclick="runSOS()">SOS<br>ENVIE</div>
        <div class="log-circle" onclick="addEntry()">LOG<br>CIG</div>
        <div class="chrono-section">
            <div class="chrono-time" id="ui-chrono">00:00:00</div>
            <div class="health-hint" id="ui-health">DERNIERE CIGARETTE</div>
        </div>
    </footer>

    <div id="settings">
        <div class="modal">
            <h2 style="margin-bottom:30px; letter-spacing:2px;">SETTINGS</h2>
            <label class="stat-label">Prix du Paquet (€)</label><input type="number" step="0.01" id="set-price">
            <label class="stat-label">Cigarettes par Paquet</label><input type="number" id="set-count">
            <label class="stat-label">Objectif Quotidien</label><input type="number" id="set-goal">
            <label class="stat-label">Timer SOS (Min)</label><input type="number" id="set-sos">
            
            <button class="btn-action" style="background:var(--accent); color:#000;" onclick="saveSettings()">SAVE CHANGES</button>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                <button onclick="exportData()" style="padding:15px; background:#222; color:#fff; border:none; border-radius:10px;">EXPORT</button>
                <button onclick="document.getElementById('file-in').click()" style="padding:15px; background:#222; color:#fff; border:none; border-radius:10px;">IMPORT</button>
            </div>
            <input type="file" id="file-in" style="display:none" onchange="importData(event)">

            <button class="btn-action btn-reset" onclick="hardReset()">⚠️ RESET ALL DATA</button>
            
            <button onclick="ui('settings', false)" style="width:100%; margin-top:30px; background:none; border:none; color:#444; cursor:pointer;">CLOSE</button>
        </div>
    </div>

<script>
    // Ajout de bestRecord dans l'objet par défaut
    let db = { records: [], goal: 14, sosMin: 15, packPrice: 19.5, packCount: 30, bestRecord: 0 };
    let chart = null;
    let currentPeriod = '7j';
    let currentView = 'cig'; // 'cig' ou 'cash'
    let lastTs = 0;
    let audioCtx = null;

    function playSound(freq) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
        o.start(); o.stop(audioCtx.currentTime + 0.3);
    }

    function init() {
        const saved = localStorage.getItem('neuro_stim_apex_final');
        if (saved) {
            const parsed = JSON.parse(saved);
            // On fusionne pour être sûr de garder bestRecord s'il existe
            db = { ...db, ...parsed };
        }
        refresh();
        setInterval(tick, 1000);
    }

    function toggleView(v) {
        playSound(400);
        currentView = v;
        document.getElementById('v-cig').classList.toggle('active', v === 'cig');
        document.getElementById('v-cash').classList.toggle('active', v === 'cash');
        refresh();
    }

    function addEntry() {
        playSound(220);
        db.records.push({ ts: Date.now(), p: (db.packPrice / db.packCount), g: db.goal });
        save(); refresh();
    }

    function refresh() {
        const now = new Date();
        const todayStr = now.toDateString();
        let totalSpent = 0, todayCount = 0, todayCash = 0, dailyMap = {};

        db.records.forEach(r => {
            const d = new Date(r.ts).toDateString();
            if (!dailyMap[d]) dailyMap[d] = { count: 0, cash: 0, goal: r.g || db.goal };
            dailyMap[d].count++;
            dailyMap[d].cash += r.p;
            totalSpent += r.p;
            if (d === todayStr) {
                todayCount++;
                todayCash += r.p;
            }
            if (r.ts > lastTs) lastTs = r.ts;
        });

        document.getElementById('val-total').innerText = totalSpent.toFixed(2) + "€";
        document.getElementById('val-today').innerText = currentView === 'cig' ? todayCount : todayCash.toFixed(2) + "€";
        document.getElementById('label-today').innerText = currentView === 'cig' ? "Aujourd'hui" : "Coût Jour";

        const days = currentPeriod === '7j' ? 7 : (currentPeriod === '30j' ? 30 : 365);
        document.getElementById('label-avg').innerText = "Moyenne " + currentPeriod.toUpperCase();

        let curSum = 0, preSum = 0;
        for(let i=0; i<days; i++) {
            let d1 = new Date(); d1.setDate(now.getDate() - i);
            let d2 = new Date(); d2.setDate(now.getDate() - (i + days));
            const data1 = dailyMap[d1.toDateString()];
            const data2 = dailyMap[d2.toDateString()];
            curSum += data1 ? (currentView === 'cig' ? data1.count : data1.cash) : 0;
            preSum += data2 ? (currentView === 'cig' ? data2.count : data2.cash) : 0;
        }

        const avg = curSum / days;
        document.getElementById('val-avg').innerText = currentView === 'cig' ? avg.toFixed(1) : avg.toFixed(2) + "€";
        
        const tr = document.getElementById('val-trend');
        tr.innerText = curSum > preSum ? "HAUSSE ↑" : (curSum < preSum ? "BAISSE ↓" : "STABLE");
        tr.style.color = curSum > preSum ? "var(--danger)" : (curSum < preSum ? "var(--success)" : "#fff");

        updateChart(days, dailyMap);
    }

    function updateChart(days, map) {
        const ctx = document.getElementById('apexChart').getContext('2d');
        if (chart) chart.destroy();
        const labels = [], data = [], goals = [];
        for (let i = days - 1; i >= 0; i--) {
            let d = new Date(); d.setDate(new Date().getDate() - i);
            labels.push(days === 365 ? (i%60===0 ? d.toLocaleDateString() : '') : d.getDate());
            const dayData = map[d.toDateString()];
            data.push(dayData ? (currentView === 'cig' ? dayData.count : dayData.cash) : 0);
            if (currentView === 'cig') {
                goals.push(dayData ? dayData.goal : db.goal);
            }
        }
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    data: data, 
                    borderColor: currentView === 'cig' ? '#4deeea' : '#00ffa3', 
                    borderWidth: 3, tension: 0.4, fill: false, pointRadius: days > 30 ? 0 : 4 
                },
                { 
                    data: currentView === 'cig' ? goals : [], 
                    borderColor: 'rgba(255, 45, 85, 0.3)', borderDash: [5, 5], borderWidth: 1, pointRadius: 0 
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#1a1a1a' }, ticks: { color: '#444' } }, 
                    x: { grid: { display: false }, ticks: { color: '#444' } } 
                }
            }
        });
    }

    function tick() {
        if (!lastTs) return;
        const diff = Math.floor((Date.now() - lastTs) / 1000);
        const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById('ui-chrono').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    window.hardReset = () => {
        playSound(800);
        if(confirm("⚠️ SUPPRIMER TOUT L'HISTORIQUE ?")) {
            if(confirm("Dernière confirmation ?")) {
                localStorage.removeItem('neuro_stim_apex_final');
                location.reload();
            }
        }
    };

    window.saveSettings = () => {
        playSound(440);
        db.packPrice = parseFloat(document.getElementById('set-price').value);
        db.packCount = parseInt(document.getElementById('set-count').value);
        db.goal = parseInt(document.getElementById('set-goal').value);
        db.sosMin = parseInt(document.getElementById('set-sos').value);
        save(); refresh(); ui('settings', false);
    };

    function save() { localStorage.setItem('neuro_stim_apex_final', JSON.stringify(db)); }
    window.ui = (id, show) => {
        if(show) {
            playSound(600);
            document.getElementById('set-price').value = db.packPrice;
            document.getElementById('set-count').value = db.packCount;
            document.getElementById('set-goal').value = db.goal;
            document.getElementById('set-sos').value = db.sosMin;
        }
        document.getElementById(id).style.display = show ? 'block' : 'none';
    };
    window.changePeriod = (p) => { 
        playSound(300); 
        currentPeriod = p; 
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
        document.getElementById('btn-'+p).classList.add('active'); 
        refresh(); 
    };
    window.exportData = () => { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `neuro_stim_backup.json`; a.click(); };
    window.importData = (e) => { 
        const reader = new FileReader(); 
        reader.onload = (f) => { 
            const data = JSON.parse(f.target.result);
            // Sécurité : on s'assure que même si le JSON est vieux, on ne casse pas db
            db = { ...db, ...data };
            save(); refresh(); ui('settings', false); 
        }; 
        reader.readAsText(e.target.files[0]); 
    };
    window.runSOS = () => {
        playSound(880);
        const btn = document.getElementById('sos-btn'); btn.style.pointerEvents = 'none';
        let sec = db.sosMin * 60;
        const itv = setInterval(() => {
            btn.innerText = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
            if (sec-- <= 0) { clearInterval(itv); btn.innerText = "SOS\nENVIE"; btn.style.pointerEvents = 'auto'; }
        }, 1000);
    };
    init();
</script>
</body>
</html>
