<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEURO_STIM RYTHME</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --accent: #4deeea; --danger: #ff2d55; --success: #00ffa3; --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { padding: 30px; border-bottom: 1px solid #1a1a1c; text-align: center; }
        .logo { font-weight: 900; font-size: 1rem; letter-spacing: 4px; color: var(--accent); }

        .content { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; gap: clamp(40px, 10vh, 100px); padding: 20px;
        }

        .stats-row { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px; 
            width: 100%; max-width: 900px; text-align: center; 
        }
        .label { font-size: clamp(0.7rem, 2vw, 0.9rem); color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .val { font-family: 'JetBrains Mono', monospace; font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; }

        .timer-section { text-align: center; width: 100%; }
        #next-timer { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: clamp(5rem, 22vw, 15rem); 
            line-height: 0.9; font-weight: 900; margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .progress-container { 
            width: 100%; max-width: 600px; height: 18px; background: #111; 
            border-radius: 9px; margin: 30px auto; border: 1px solid #222; overflow: hidden; 
        }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: width 1s linear; }

        .footer-tools { padding: 40px; display: flex; justify-content: center; gap: 20px; }
        .btn-back { 
            padding: 15px 30px; border: 1px solid #333; background: #111; color: #fff; 
            border-radius: 10px; font-weight: 900; font-size: 0.8rem; cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NEURO_STIM <span style="font-weight:100; opacity:0.5">RYTHME</span></div>
    </div>

    <div class="content">
        <div class="stats-row">
            <div><span class="label">Théorie</span><div class="val" id="theory" style="color:var(--accent)">0</div></div>
            <div><span class="label">Réel</span><div class="val" id="real">0</div></div>
        </div>

        <div class="timer-section">
            <span class="label">Prochain Slot</span>
            <div id="next-timer">00:00</div>
            <div class="progress-container"><div id="bar"></div></div>
        </div>
    </div>

    <div class="footer-tools">
        <a href="index.html" class="btn-back">RETOUR AUX STATS</a>
    </div>

<script>
    let db = { records: [], goal: 12 };
    
    function load() {
        const saved = localStorage.getItem('neuro_stim_apex_final');
        if (saved) db = JSON.parse(saved);
        update();
    }

    function update() {
        const now = new Date();
        const todayStr = now.toDateString();
        
        // Calcul Réel
        const todayRecords = db.records.filter(r => new Date(r.ts).toDateString() === todayStr);
        const realCount = todayRecords.length;
        
        // Calcul Théorie (Division sur 24h)
        const theoryCount = Math.floor((db.goal / 24) * (now.getHours() + now.getMinutes()/60));
        
        // Dernier LOG pour le chrono
        const lastTs = db.records.length > 0 ? Math.max(...db.records.map(r => r.ts)) : 0;

        // UI
        document.getElementById('theory').textContent = theoryCount;
        document.getElementById('real').textContent = realCount;
        document.getElementById('real').style.color = realCount > theoryCount ? "var(--danger)" : "var(--success)";

        if (lastTs > 0) {
            const diff = Math.floor((Date.now() - lastTs) / 1000);
            const interval = (24 / db.goal) * 3600;
            const rem = Math.max(interval - diff, 0);
            
            document.getElementById('next-timer').textContent = 
                `${Math.floor(rem/60).toString().padStart(2,'0')}:${Math.floor(rem%60).toString().padStart(2,'0')}`;
            document.getElementById('next-timer').style.color = rem === 0 ? "var(--success)" : "#fff";
            document.getElementById('bar').style.width = Math.min((diff / interval) * 100, 100) + "%";
        }
    }

    setInterval(update, 1000);
    window.onload = load;
    // Écouter si les données changent dans un autre onglet/page
    window.addEventListener('storage', load);
</script>
</body>
</html>
