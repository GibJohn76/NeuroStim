<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEURO_STIM ANALYTICS v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505; --accent: #4deeea; --danger: #ff2d55; --success: #00ffa3; --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            height: 100dvh; display: flex; flex-direction: column; 
            overflow: hidden; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .header { height: 15vh; display: flex; align-items: center; justify-content: center; flex: none; }
        .logo { font-weight: 900; font-size: 1rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }
        
        .stats-summary { 
            height: 12vh; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            padding: 0 20px; flex: none; 
        }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 2.1rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; display: block; opacity: 0.8; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 900; }

        .chart-container { 
            flex: 1; 
            padding: 10px 20px;
            min-height: 0; 
            position: relative;
        }

        .footer { 
            height: 15vh; display: flex; align-items: center; justify-content: center; flex: none;
        }
        .btn-back { 
            font-size: 0.75rem; font-weight: 900; color: #fff; text-decoration: none; 
            text-transform: uppercase; letter-spacing: 1px; border: 1px solid #333;
            padding: 12px 30px; border-radius: 10px; background: #111;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Analytic <span style="font-weight:100; opacity:0.5">Fréquence</span></div>
    </div>

    <div class="stats-summary">
        <div class="stat-card">
            <span class="stat-label">Aujourd'hui</span>
            <div class="stat-val" id="today-total" style="color: var(--success)">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Moyenne / J</span>
            <div class="stat-val" id="avg-total" style="color: var(--danger)">0</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="frequencyChart"></canvas>
    </div>

    <div class="footer">
        <a href="index.html" class="btn-back">RETOUR</a>
    </div>

<script>
    function loadData() {
        const saved = localStorage.getItem('neuro_stim_apex_final');
        return saved ? JSON.parse(saved) : { records: [] };
    }

    function getNormalizedDensity(records, isTodayOnly) {
        const now = new Date();
        const todayStr = now.toDateString();
        let density = new Array(144).fill(0);
        
        const filtered = isTodayOnly 
            ? records.filter(r => new Date(r.ts).toDateString() === todayStr)
            : records;

        if (filtered.length === 0) return density;

        filtered.forEach(r => {
            const d = new Date(r.ts);
            const index = Math.floor((d.getHours() * 60 + d.getMinutes()) / 10);
            for(let i = -2; i <= 2; i++) {
                let idx = (index + i + 144) % 144;
                let weight = i === 0 ? 1 : (Math.abs(i) === 1 ? 0.6 : 0.3);
                density[idx] += weight;
            }
        });

        const maxVal = Math.max(...density);
        return maxVal > 0 ? density.map(v => v / maxVal) : density;
    }

    function processStats() {
        const db = loadData();
        const records = db.records || [];
        
        const todayData = getNormalizedDensity(records, true);
        const avgData = getNormalizedDensity(records, false);
        
        const todayCount = records.filter(r => new Date(r.ts).toDateString() === new Date().toDateString()).length;
        const totalDays = new Set(records.map(r => new Date(r.ts).toDateString())).size || 1;
        
        document.getElementById('today-total').textContent = todayCount;
        document.getElementById('avg-total').textContent = (records.length / totalDays).toFixed(1);

        renderChart(todayData, avgData);
    }

    function renderChart(today, average) {
        const ctx = document.getElementById('frequencyChart').getContext('2d');
        const labels = Array.from({length: 144}, (_, i) => {
            if (i === 143) return '0h';
            const h = Math.floor((i * 10) / 60);
            const m = (i * 10) % 60;
            return m === 0 ? h + 'h' : '';
        });

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Réel',
                        data: today,
                        borderColor: '#00ffa3',
                        backgroundColor: 'rgba(0, 255, 163, 0.05)',
                        borderWidth: 2,
                        tension: 0.5,
                        fill: true,
                        pointRadius: 0
                    },
                    {
                        label: 'Moyenne',
                        data: average,
                        borderColor: '#ff2d55',
                        borderWidth: 1.5,
                        borderDash: [5, 5],
                        tension: 0.5,
                        fill: false,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                clip: false,
                layout: {
                    padding: { left: 15, right: 15, top: 10, bottom: 0 }
                },
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        min: 0,
                        max: 1.0,
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { 
                            stepSize: 0.1,
                            color: '#fff', 
                            font: { size: 8, family: 'JetBrains Mono' },
                            callback: function(value) {
                                if (value === 1) return 'MAX';
                                if (value === 0.5) return '0.5';
                                return value.toFixed(1);
                            }
                        } 
                    },
                    x: { 
                        offset: true, 
                        grid: { display: false }, 
                        ticks: { 
                            color: '#fff', 
                            font: { size: 8, family: 'JetBrains Mono' },
                            maxRotation: 0,
                            autoSkip: false
                        } 
                    }
                }
            }
        });
    }

    window.onload = processStats;
</script>
</body>
</html>
