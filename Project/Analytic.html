<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEURO_STIM ANALYTICS v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000; --accent: #4deeea; --danger: #ff2d55; --success: #00ffa3; --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            height: 100dvh; display: flex; flex-direction: column; 
            overflow: hidden; padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        .header { height: 10vh; display: flex; align-items: center; justify-content: center; flex: none; }
        .logo { font-weight: 900; font-size: 2rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }
        
        .stats-summary { 
            display: flex; justify-content: center; gap: 15px; height: 12vh; margin-bottom: 10px; flex: none; 
        }
        .stat-card { 
            background: #111; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; text-align: center;
            flex: 1; max-width: 180px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .stat-label { font-size: 0.7rem; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; font-weight: 700; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; display: flex; align-items: center; justify-content: center; }
        .trend-indicator { font-size: 0.8rem; font-weight: 900; margin-left: 8px; padding: 2px 4px; border-radius: 4px; }

        .chart-container { 
            flex: 1; min-height: 0; position: relative; 
            background: #050505; border-radius: 15px; border: 1px solid #222;
            padding: 15px 5px 5px 5px;
        }

        .footer { height: 12vh; display: flex; align-items: center; justify-content: center; flex: none; }
        .btn-back { 
            font-size: 0.8rem; font-weight: 900; color: #fff; text-decoration: none; 
            text-transform: uppercase; letter-spacing: 2px; border: 2px solid #333;
            padding: 15px 40px; border-radius: 12px; background: #111;
        }
    </style>
</head>
<body>

    <div class="header"><div class="logo">NEURO_ <span style="font-weight:100; opacity:0.5">ANALYTIC</span></div></div>

    <div class="stats-summary">
        <div class="stat-card">
            <span class="stat-label">Aujourd'hui</span>
            <div class="stat-val" id="today-total" style="color: var(--success)">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Moyenne 15J</span>
            <div class="stat-val">
                <span id="avg-total">0</span>
                <span id="trend-val" class="trend-indicator"></span>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="frequencyChart"></canvas>
    </div>

    <div class="footer">
        <a href="index.html" class="btn-back">RETOUR</a>
    </div>

<script>
    const MS_PER_DAY = 24 * 60 * 60 * 1000;

    function loadData() {
        const saved = localStorage.getItem('neuro_stim_apex_final');
        return saved ? JSON.parse(saved) : { records: [] };
    }

    function getDensity(records, isTodayOnly) {
        let density = new Array(144).fill(0);
        const now = new Date();
        
        let filtered;
        if (isTodayOnly) {
            const todayStr = now.toDateString();
            filtered = records.filter(r => new Date(r.ts).toDateString() === todayStr);
        } else {
            const thirtyDaysAgo = Date.now() - (30 * MS_PER_DAY);
            filtered = records.filter(r => r.ts >= thirtyDaysAgo);
        }

        if (filtered.length === 0) return density;

        filtered.forEach(r => {
            const d = new Date(r.ts);
            const index = Math.floor((d.getHours() * 60 + d.getMinutes()) / 10);
            const weights = [0.4, 0.7, 0.9, 1.0, 0.9, 0.7, 0.4]; 
            for(let i = -3; i <= 3; i++) {
                let idx = (index + i + 144) % 144;
                density[idx] += weights[i + 3];
            }
        });

        if (!isTodayOnly) return density.map(v => Math.min(v / 30, 1.0));
        return density.map(v => Math.min(v, 1.0));
    }

    function processStats() {
        const db = loadData();
        const records = db.records || [];
        const nowTs = Date.now();

        const todayData = getDensity(records, true);
        const habitData = getDensity(records, false); 
        
        const last15 = records.filter(r => r.ts > (nowTs - (15 * MS_PER_DAY)));
        const prev15 = records.filter(r => r.ts <= (nowTs - (15 * MS_PER_DAY)) && r.ts > (nowTs - (30 * MS_PER_DAY)));
        
        const currentAvg = last15.length / 15;
        const previousAvg = prev15.length / 15;

        document.getElementById('today-total').textContent = records.filter(r => new Date(r.ts).toDateString() === new Date().toDateString()).length;
        document.getElementById('avg-total').textContent = currentAvg.toFixed(1);

        const trendEl = document.getElementById('trend-val');
        if (previousAvg > 0) {
            const diff = ((currentAvg - previousAvg) / previousAvg) * 100;
            const sign = diff > 0 ? '↑' : '↓';
            trendEl.textContent = `${sign}${Math.abs(diff).toFixed(0)}%`;
            trendEl.style.color = diff > 0 ? 'var(--danger)' : 'var(--success)';
            trendEl.style.background = "rgba(255,255,255,0.05)";
        } else {
            // Sécurité : Affiche "NEW" si pas de données de comparaison
            trendEl.textContent = "NEW";
            trendEl.style.color = "#888";
            trendEl.style.background = "transparent";
        }

        renderChart(todayData, habitData);
    }

    function renderChart(today, habits) {
        const ctx = document.getElementById('frequencyChart').getContext('2d');
        const labels = Array.from({length: 144}, (_, i) => {
            const h = Math.floor((i * 10) / 60);
            const m = (i * 10) % 60;
            return m === 0 ? h + 'h' : '';
        });

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Réel',
                        data: today,
                        borderColor: '#00ffa3',
                        backgroundColor: 'rgba(0, 255, 163, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0
                    },
                    {
                        label: 'Habitude',
                        data: habits,
                        borderColor: '#ff2d55',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        tension: 0.4,
                        fill: false,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { bottom: 10 } },
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        min: 0, max: 1.0,
                        grid: { color: '#222', drawBorder: false }, 
                        ticks: { 
                            stepSize: 0.1, color: '#fff', 
                            font: { size: 10, family: 'JetBrains Mono', weight: 'bold' },
                            callback: v => v === 1 ? 'MAX' : v.toFixed(1)
                        } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { 
                            color: '#fff', font: { size: 9, family: 'JetBrains Mono', weight: 'bold' },
                            maxRotation: 0, autoSkip: false
                        } 
                    }
                }
            }
        });
    }

    window.onload = processStats;
</script>
</body>
</html>
